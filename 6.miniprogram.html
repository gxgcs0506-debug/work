<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小程序二维码展示</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
        }
        .container {
            display: flex;
            gap: 40px;
        }
        .qr-box {
            text-align: center;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        img {
            width: 200px;
            height: 200px;
            object-fit: contain;
        }
        .title {
            margin-top: 10px;
            font-size: 16px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="qr-box">
            <img src="qr1.png" alt="小程序二维码1">
            <div class="title">解压星球所</div>
        </div>
        <div class="qr-box">
            <img src="qr2.png" alt="小程序二维码2">
            <div class="title">趣味日历</div>
        </div>
    </div>
</body>
</html>
