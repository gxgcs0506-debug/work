<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>产品项目展示</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #ffffff;
      padding: 50px 40px;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
      text-align: center;
      width: 380px;
    }

    h1 {
      margin-bottom: 30px;
      font-size: 22px;
      color: #333;
    }

    .project-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .project-list li {
      margin-bottom: 15px;
    }

    .project-list a {
      display: block;
      text-decoration: none;
      padding: 12px;
      border-radius: 10px;
      background: #f3f4f6;
      color: #333;
      font-weight: 500;
      transition: all 0.25s ease;
    }

    .project-list a:hover {
      background: #667eea;
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(0,0,0,0.15);
    }

    .footer {
      margin-top: 25px;
      font-size: 12px;
      color: #888;
    }

  </style>
</head>
<body>
  <div class="container">
    <h1>产品项目展示</h1>
    <ul class="project-list">
      <li><a href="1.PCprogramV1.0.0/">PC Program V1.0.0</a></li>
      <li><a href="2.MiniprogramV1.6.0/">Mini Program V1.6.0</a></li>
      <li><a href="3.GrowthActivityV1.0.0/">Growth Activity V1.0.0</a></li>
      <li><a href="4.MiniprogramZYB/">MiniprogramZYB</a></li>
    </ul>
    <div class="footer">
      Hosted by PXM
    </div>
  </div>
</body>
</html>
